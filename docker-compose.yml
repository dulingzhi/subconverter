version: '3.8'

services:
  subconverter:
    build: .
    ports:
      - "25500:25500"
    environment:
      - PORT=25500
      - HOST=0.0.0.0
      # - API_TOKEN=your-secret-token
    volumes:
      - ./pref.toml:/app/pref.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:25500/health"]
      interval: 30s
      timeout: 3s
      retries: 3
